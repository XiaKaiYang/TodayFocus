name: FocusSession

options:
  minimumXcodeGenVersion: 2.45.0
  createIntermediateGroups: true
  groupSortPosition: top
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Development.xcconfig
  Release: Config/Shared.xcconfig

settings:
  base:
    PRODUCT_NAME: $(TARGET_NAME)
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
    SWIFT_VERSION: 6.0
    CODE_SIGNING_ALLOWED: $(FOCUSSESSION_CODE_SIGNING_ALLOWED)
    CODE_SIGNING_REQUIRED: $(FOCUSSESSION_CODE_SIGNING_REQUIRED)
    CODE_SIGN_STYLE: $(FOCUSSESSION_CODE_SIGN_STYLE)
    CODE_SIGN_IDENTITY: $(FOCUSSESSION_CODE_SIGN_IDENTITY)
    DEVELOPMENT_TEAM: $(FOCUSSESSION_DEVELOPMENT_TEAM)
    ENABLE_HARDENED_RUNTIME: NO
    GENERATE_INFOPLIST_FILE: YES

packages:
  FocusSessionCore:
    path: Packages/FocusSessionCore

targets:
  FocusSessionApp:
    type: application
    platform: macOS
    sources:
      - path: Apps/FocusSessionApp
    dependencies:
      - package: FocusSessionCore
      - target: FocusSessionWidget
        embed: true
    info:
      path: Apps/FocusSessionApp/Info.plist
      properties:
        CFBundleDisplayName: TodayFocus
        CFBundleURLTypes:
          - CFBundleURLName: TodayFocus
            CFBundleURLSchemes:
              - todayfocus
        LSMinimumSystemVersion: "15.0"
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: false
    entitlements:
      path: Config/Entitlements/FocusSessionApp.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.example.FocusSession
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.example.FocusSession
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FocusSession
        PRODUCT_NAME: TodayFocus
        PRODUCT_MODULE_NAME: FocusSession

  FocusSessionMobileApp:
    type: application
    platform: iOS
    sources:
      - path: Apps/FocusSessionApp
        excludes:
          - Info.plist
          - FocusSessionApp.swift
          - Blocking/**
          - DevTools/**
          - UI/AppShell/AppShellView.swift
          - UI/AppShell/AppMenuTitleSynchronizer.swift
          - UI/AppShell/CurrentSessionStatusItemController.swift
          - UI/AppShell/WindowChromeConfigurator.swift
          - UI/Blocker/**
          - ViewModels/BlockerViewModel.swift
      - path: Apps/FocusSessionMobileApp
        excludes:
          - Info.plist
    dependencies:
      - package: FocusSessionCore
    info:
      path: Apps/FocusSessionMobileApp/Info.plist
      properties:
        CFBundleDisplayName: TodayFocus
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Config/Entitlements/FocusSessionMobileApp.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.example.FocusSession
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconMobile
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FocusSession.Mobile
        PRODUCT_NAME: TodayFocusMobile
        PRODUCT_MODULE_NAME: FocusSessionMobile

  FocusSessionHelper:
    type: application
    platform: macOS
    sources:
      - path: Apps/FocusSessionHelper
    dependencies:
      - package: FocusSessionCore
    info:
      path: Apps/FocusSessionHelper/Info.plist
      properties:
        CFBundleDisplayName: FocusSessionHelper
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
    entitlements:
      path: Config/Entitlements/FocusSessionHelper.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.example.FocusSession
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FocusSession.Helper
        PRODUCT_NAME: FocusSessionHelper
        SKIP_INSTALL: YES

  FocusSessionWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Extensions/FocusSessionWidget
    dependencies:
      - package: FocusSessionCore
    info:
      path: Extensions/FocusSessionWidget/Info.plist
      properties:
        CFBundleDisplayName: FocusSessionWidget
        LSMinimumSystemVersion: "15.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Config/Entitlements/FocusSessionWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.example.FocusSession
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FocusSession.Widget
        PRODUCT_NAME: FocusSessionWidget
        SKIP_INSTALL: YES

  FocusSessionIntents:
    type: app-extension
    platform: macOS
    sources:
      - path: Extensions/FocusSessionIntents
    dependencies:
      - package: FocusSessionCore
    info:
      path: Extensions/FocusSessionIntents/Info.plist
      properties:
        CFBundleDisplayName: FocusSessionIntents
        LSMinimumSystemVersion: "15.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.intents-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).IntentHandler
          NSExtensionAttributes:
            IntentsSupported:
              - StartSessionIntent
              - TogglePauseIntent
              - TotalFocusTimeIntent
    entitlements:
      path: Config/Entitlements/FocusSessionIntents.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.example.FocusSession
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FocusSession.Intents
        PRODUCT_NAME: FocusSessionIntents
        SKIP_INSTALL: YES

  FocusSessionSafari:
    type: app-extension
    platform: macOS
    sources:
      - path: Extensions/FocusSessionSafari
    info:
      path: Extensions/FocusSessionSafari/Info.plist
      properties:
        CFBundleDisplayName: FocusSessionSafari
        LSMinimumSystemVersion: "15.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
    entitlements:
      path: Config/Entitlements/FocusSessionSafari.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.example.FocusSession
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FocusSession.Safari
        PRODUCT_NAME: FocusSessionSafari
        SKIP_INSTALL: YES

  FocusSessionAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/FocusSessionAppTests
    dependencies:
      - target: FocusSessionApp
      - package: FocusSessionCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FocusSession.AppTests
        PRODUCT_NAME: FocusSessionAppTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/TodayFocus.app/Contents/MacOS/TodayFocus
        BUNDLE_LOADER: $(TEST_HOST)

  FocusSessionMobileAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/FocusSessionMobileAppTests
    dependencies:
      - target: FocusSessionMobileApp
      - package: FocusSessionCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FocusSession.MobileAppTests
        PRODUCT_NAME: FocusSessionMobileAppTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/TodayFocusMobile.app/TodayFocusMobile
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  FocusSessionSafari:
    build:
      targets:
        FocusSessionSafari: all
